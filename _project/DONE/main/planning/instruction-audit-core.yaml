must_preserve:
  - "All existing types in src/core/types.ts remain unchanged"
  - "All existing exports in src/core/index.ts remain unchanged"
  - "syncOperation() in operations.ts is not modified"
  - "doctorOperation() in operations.ts is not modified (CLI integration is separate TODO)"
  - "All 166+ existing tests continue to pass"

approach: |
  Follow the AGENT_TARGETS pattern from src/core/compatibility.ts for the registry
  design (const record keyed by string union type). Follow the detectDrift() pattern
  from src/core/drift.ts for file discovery and state classification (takes root path,
  returns structured report). Reuse sha256() from src/core/hasher.ts for content
  hashing. Types go in a separate file (instruction-types.ts) to avoid bloating
  types.ts, matching how compatibility.ts has its own AgentTarget type.

anti_patterns:
  - "DO NOT import from cli/ or mcp/ -- because core layer rule -- keep instruction-audit.ts in core only"
  - "DO NOT add instruction state to skill-sync.lock -- because global files are machine-local and personal -- instruction audit is always a fresh scan"
  - "DO NOT add external dependencies -- because zero-dep constraint -- use line-set intersection for overlap, not a diff library"
  - "DO NOT modify syncOperation() -- because instruction audit is standalone -- it does not participate in skill materialization"

