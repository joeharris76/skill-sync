  estimated_effort: Medium
  created_date: "2026-03-25"

impact:
  business_value: |
    Enables users to understand instruction file gaps across platforms before they
    cause problems. Users on web/iOS lose all global instructions silently -- this
    feature surfaces that gap proactively.
  user_impact: |
    Users get clear visibility into which instruction files exist, where, and whether
    they're duplicated or missing. Reduces "why didn't Claude follow my instructions"
    confusion when switching between CLI and web/iOS.

