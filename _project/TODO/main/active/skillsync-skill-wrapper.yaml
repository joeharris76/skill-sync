id: "skillsync-skill-wrapper"
title: "Create a skillsync skill wrapper for Claude/Codex bootstrapping"
worktree: "main"
priority: "High"
status: "In Progress"
description: |
  Create a `/skillsync` skill (SKILL.md) that users can add to their Claude or
  Codex agent skill directories. This is the minimum viable onboarding step:
  drop the skill in, and the agent can manage skills via natural language.

  The wrapper should expose all key CLI/MCP action verbs (sync, status, validate,
  diff, doctor, pin, unpin, prune, promote) plus a `setup`/`bootstrap` verb that
  detects whether skillsync is installed, installs it if needed, and scaffolds a
  `skillsync.yaml` manifest from the user's existing skills directory.

  This is a user-facing skill file, not library code. It follows the same pattern
  as the existing code/test/docs/todo skills in ~/.claude/skills/.

category: "Developer Experience"

deps:
  needs: []

work:
  - id: w1
    summary: "Design the skillsync skill: audit existing patterns, define action table and bootstrap workflow"
    status: done
    notes: |
      Audit existing skills (code, test, docs, todo) for structural conventions:
      SKILL.md frontmatter format, action table layout, project config reading
      pattern, SHARED framework references, output format section.

      Then define the action verb table:
      - setup/bootstrap: detect install, npm install -g skillsync, scaffold
        skillsync.yaml from existing ~/.claude/skills or .claude/skills
      - sync: resolve + plan + apply skills
      - status: show installed skill health
      - validate: check manifest + skills + config
      - diff: preview sync changes (dry-run)
      - doctor: comprehensive health diagnostics
      - pin/unpin: lock/unlock skill revisions
      - prune: remove undeclared skills
      - promote: guide pushing local changes upstream

      Bootstrap workflow: check `which skillsync` or `npx skillsync --version`,
      scan existing skill directories, generate starter manifest, run first sync.

      Deliverable: design doc or notes in the TODO item itself.

  - id: w2
    summary: "Write the SKILL.md file with frontmatter, actions, and output format"
    needs: [w1]
    status: done
    files:
      - skills/skillsync/SKILL.md

  - id: w3
    summary: "Wire the skill into the distribution pipeline as a bundled default skill"
    needs: [w2]
    status: done
    files:
      - skills/skillsync/SKILL.md
      - skills/skillsync/skill.yaml
    notes: |
      The canonical skill lives in the skillsync repo at skills/skillsync/.
      Add a skill.yaml sidecar with appropriate tags and targets.
      Ensure `skillsync sync` can distribute this skill like any other.
      Consider making it a default skill that `skillsync setup` installs
      automatically into target directories.

  - id: w4
    summary: "Test the skill end-to-end: fresh project bootstrap and each action verb"
    needs: [w2]
    status: pending
    notes: |
      Manual testing in a fresh directory: drop SKILL.md into .claude/skills/skillsync/,
      verify Claude can discover it, run setup to scaffold manifest, run sync,
      check status, validate, etc.

      Bootstrap test: given a directory with 3 existing SKILL.md files, verify
      setup generates a valid skillsync.yaml listing all 3 skills.

deferred:
  - summary: "Codex-specific skill variant with Codex conventions"
    reason: "v0 targets Claude; Codex adaptation is a follow-up"
  - summary: "Automated skillsync install via skill (npm/npx detection)"
    reason: "v0 setup verb provides guidance; auto-install is v0.2"

metadata:
  tags:
    - developer-experience
    - onboarding
    - skill
  estimated_effort: "1-2 days"
  created_date: "2026-03-08"

impact:
  business_value: |
    Removes the biggest adoption barrier: users can start using skillsync
    by copying a single file rather than reading docs and learning the CLI.
  user_impact: |
    Zero-to-working in one step. Users say "sync my skills" or "set up
    skillsync" and the agent handles the rest.

must_preserve:
  - "SKILL.md frontmatter must use standard fields (name, description, version, tools) so Claude/Codex skill loaders discover and index it correctly"
  - "CLI command interface — the skill must invoke `skillsync <cmd>` with documented flags, not invent new options or override existing behavior"
  - "Existing skill directory layout conventions (.claude/skills/<name>/SKILL.md) must be respected by the bootstrap scanner"

verification:
  - description: "SKILL.md frontmatter parses as valid YAML with required fields"
    command: "node -e \"const fs=require('fs'); const y=require('yaml'); const m=fs.readFileSync('skills/skillsync/SKILL.md','utf8').match(/^---\\n([\\s\\S]*?)\\n---/); const d=y.parse(m[1]); console.log(d.name, d.description ? 'OK' : 'MISSING', d.tools ? 'OK' : 'MISSING')\""
    expected_output: "skillsync OK OK"
  - description: "All 10 CLI action verbs appear in the skill's action table"
    command: "grep -oE '(setup|sync|status|validate|diff|doctor|pin|unpin|prune|promote)' skills/skillsync/SKILL.md | sort -u | wc -l"
    expected_output: "10"
  - description: "Bootstrap workflow section documents scanning existing skills and generating manifest"
    command: "grep -c 'skillsync.yaml' skills/skillsync/SKILL.md"
    expected_output: "At least 2 references (one in setup steps, one in output)"
  - description: "Skill invokes CLI commands, not internal functions"
    command: "grep -c 'skillsync ' skills/skillsync/SKILL.md"
    expected_output: "Multiple occurrences (at least 5)"

approach: |
  The skill lives in the skillsync repo at `skills/skillsync/SKILL.md` and
  is distributed via the normal sync pipeline.

  Follow the pattern established by ~/.claude/skills/code/SKILL.md:
  - YAML frontmatter (name, description, version, tools)
  - Project Configuration section (reads skillsync.config.yaml)
  - Action table mapping triggers to descriptions
  - Per-action sections with input, steps, output
  - Output format section with markdown template
  - Commit rule after write actions

  The setup/bootstrap action is unique to this skill. Model it after
  `skillsync doctor` (diagnostic) + `skillsync sync` (apply). The setup
  flow should: check for skillsync install → scan existing skill directories
  for SKILL.md files → generate a starter skillsync.yaml → run first sync.

anti_patterns:
  - "DO NOT duplicate CLI logic in the skill — because the skill is a wrapper that invokes the CLI/MCP, not a reimplementation — use `skillsync <command>` calls"
  - "DO NOT require manual skillsync.yaml authoring in the setup flow — because the whole point is zero-friction onboarding — scan existing skills and generate the manifest"
  - "DO NOT invent new CLI flags or subcommands in the skill — because the skill delegates to the existing CLI surface — document the real flags from docs/cli.md"
