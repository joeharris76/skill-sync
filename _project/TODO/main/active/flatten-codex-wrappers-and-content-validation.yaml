id: "flatten-codex-wrappers-and-content-validation"
title: "Flatten Codex dual-layer wrappers and add content validation to prevent overwrite of upstream changes"
worktree: "main"
priority: "High"
status: "Not Started"
description: |
  SkillSync materializes identical skill content to all configured agent targets
  (Claude, Codex). The user's actual Codex setup uses a dual-layer wrapper pattern:
  .codex/skills/X/SKILL.md (20-line wrapper) delegates to .codex/shared-skills/X/SKILL.md
  (full canonical definition). This pattern is incompatible with skillsync's
  single-content-per-skill model.

  Strategy A: Flatten the dual-layer by using full skill definitions in .codex/skills/
  directly (matching how Claude skills already work), then let skillsync manage both
  targets with identical content. This eliminates the wrapper indirection and the
  shared-skills directory entirely.

  Additionally, harden the sync engine's existing conflict detection to support
  --force override and user-facing guidance, and add content-hash comparison between
  source and on-disk installed files (not just lock state) to catch cases where
  installed files were manually edited to match upstream.

  Existing behavior to build on:
  - diffFiles() in syncer.ts already compares SHA256 hashes between lock and source
  - planSync() already routes drift+upstream collisions to plan.conflicts[]
  - applySync() already throws on unresolved conflicts

  Scope: External skill flattening (outside this repo) + skillsync library changes
  for --force support and source-vs-disk content comparison.
category: "Feature"
deps:
  needs: []
work:
  - id: w1
    summary: "Audit current Codex wrapper content and map delegation targets"
    status: not-started
    details: |
      External to this repo. For each Codex wrapper in BenchBox and Oxbow:
      - Read wrapper SKILL.md, extract: delegation target path, added instructions
        (project-config path, commit rule, "no duplicate logic" rule)
      - Read corresponding shared-skills canonical SKILL.md
      - Read corresponding Claude SKILL.md
      - Produce a diff matrix: what does the wrapper add that Claude doesn't have?
      - Identify which additions are project-specific (belong in project-config.yaml)
        vs which are universal (should be in the canonical skill)
      Deliverable: audit table with columns [skill, wrapper-only content, shared-only
      content, claude content, reconciliation action]

  - id: w2a
    summary: "Reconcile shared skills: blog, code, test"
    status: not-started
    needs: [w1]
    details: |
      External to this repo. For blog, code, and test:
      - Merge Claude and Codex shared-skills versions into a single canonical SKILL.md
      - Standardize commit rule format (pick one: blockquote after Actions table)
      - Move project-specific config references to skillsync.meta.yaml config_inputs
      - Ensure SHARED/ framework references are consistent
      - Place canonical versions in a skills source directory (e.g., ~/.skillsync/skills/)
      Deliverable: 3 unified canonical SKILL.md files

  - id: w2b
    summary: "Reconcile shared skills: docs, todo"
    status: not-started
    needs: [w1]
    details: |
      External to this repo. For docs and todo:
      - Merge Claude and Codex shared-skills versions into a single canonical SKILL.md
      - Standardize commit rule format (pick one: blockquote after Actions table)
      - Move project-specific config references to skillsync.meta.yaml config_inputs
      - Ensure SHARED/ framework references are consistent
      - Place canonical versions in a skills source directory (e.g., ~/.skillsync/skills/)
      Deliverable: 2 unified canonical SKILL.md files

  - id: w2c
    summary: "Reconcile agent-specific skills: benchbox, substack, project-todo-sync"
    status: not-started
    needs: [w1]
    details: |
      External to this repo. For agent-specific skills:
      - benchbox: Claude+Codex at BenchBox, Codex-only at global. Tag with
        targets: { codex: true, claude: true } at project level,
        targets: { codex: true, claude: false } at global level
      - substack: Codex-only at Oxbow. Tag with targets: { codex: true, claude: false }
      - project-todo-sync: Codex-only at BenchBox. Tag with targets: { codex: true, claude: false }
      - Standardize commit rule format in each
      Deliverable: 3 canonical SKILL.md files with correct target declarations

  - id: w3
    summary: "Create skillsync.meta.yaml sidecars for all canonical skills"
    status: not-started
    needs: [w2a, w2b, w2c]
    details: |
      External to this repo. For each canonical skill, create skillsync.meta.yaml with:
      - depends: list SHARED/ framework dependencies
      - config_inputs: declare project-configurable values (lint cmd, test runner, etc.)
      - targets: { claude: true, codex: true } (or false for agent-specific skills)
      - tags and category
      For SHARED/ frameworks (commit-framework, verify-framework, etc.):
      - Create minimal skillsync.meta.yaml with targets and tags
      Deliverable: every skill and framework has a sidecar

  - id: w4
    summary: "Create skillsync.yaml manifests for global, BenchBox, and Oxbow"
    status: not-started
    needs: [w3]
    details: |
      External to this repo. Create three manifest files:

      Global (~/.skillsync/skillsync.yaml or similar):
        sources: [{ name: personal, type: local, path: ~/.skillsync/skills }]
        skills: [blog, code, test, docs, todo, benchbox, SHARED/commit-framework, ...]
        targets: { claude: .claude/skills, codex: .codex/skills }

      BenchBox (~/Developer/BenchBox/skillsync.yaml):
        sources: [{ name: global, type: local, path: ~/.skillsync/skills },
                  { name: project, type: local, path: ./skills }]
        skills: [blog, code, test, docs, todo, benchbox, project-todo-sync, SHARED/...]
        targets: { claude: .claude/skills, codex: .codex/skills }
        config: { todo: { cli: "..." }, code: { lint: "..." } }

      Oxbow (~/Developer/Oxbow/skillsync.yaml):
        sources: [{ name: global, type: local, path: ~/.skillsync/skills },
                  { name: project, type: local, path: ./skills }]
        skills: [blog, code, test, docs, todo, substack, SHARED/...]
        targets: { claude: .claude/skills, codex: .codex/skills }
        config: { todo: { cli: "{todo.cli}" } }

      Deliverable: three manifest files, validated with `skillsync validate`

  - id: w5
    summary: "Remove Codex wrapper files and shared-skills directories"
    status: not-started
    needs: [w4]
    details: |
      External to this repo. After manifests are in place and `skillsync sync --dry-run`
      confirms correctness:
      - Back up .codex/shared-skills/ directories in both BenchBox and Oxbow
      - Run `skillsync sync` in each project to materialize flattened skills
      - Verify .codex/skills/ now contains full definitions (not wrappers)
      - Remove .codex/shared-skills/ directories
      - Run `skillsync status` to confirm clean state
      - Test that Codex can load skills from .codex/skills/ without the delegation layer

  - id: w6
    summary: "Add source-vs-disk content comparison to detect manual edits matching upstream"
    status: not-started
    details: |
      In this repo. The existing diffFiles() (syncer.ts:215-251) compares lock state
      (what was installed) against source files (what's upstream now) using SHA256.
      This correctly skips updates when source content hasn't changed relative to the
      lock. However, it does NOT compare source against what's actually on disk.

      Scenario this misses: user manually edits an installed skill to match an
      upstream change (e.g., copies a fix from upstream). Lock still has old hashes,
      source has new hashes, so diffFiles() sees changes and plans an update. But the
      on-disk files already match the source — the update is redundant.

      Add to syncer.ts:
      - When an update is planned (diffFiles returns changes), re-hash the installed
        files on disk and compare against source hashes
      - If on-disk hashes match source hashes (content already identical), move the
        skill to unchanged[] instead of update[], and update lock to reflect new source
      - Add a `skipped` list to SyncPlan with reason field (e.g., "disk-matches-source")
      - Log skipped updates in sync output so user knows why nothing changed

      This requires passing the target root into planSync or adding a post-plan
      refinement step that reads disk state.
    files:
      - src/core/syncer.ts
      - src/core/types.ts

  - id: w7
    summary: "Add --force bypass and promote guidance to existing conflict handling"
    status: not-started
    details: |
      In this repo. The conflict detection infrastructure already exists:
      - planSync() (syncer.ts:132-147) routes drift+upstream collisions to conflicts[]
      - applySync() (syncer.ts:172-178) throws on unresolved conflicts

      What's missing:
      1. --force parameter on applySync() that moves conflicts to updates instead of
         throwing. When force=true, log each overwritten skill with its local changes.
      2. User-facing conflict message in sync.ts that includes actionable guidance:
         "N skill(s) have local modifications that conflict with upstream changes.
         Run `skillsync promote` to push local changes upstream first, or use
         `skillsync sync --force` to overwrite local modifications."
      3. --json output should include conflicts[] with localChanges and upstreamChanges
         detail so tooling can present diffs.

      DO NOT duplicate the existing conflict detection in planSync — only add the
      force bypass and messaging layer.
    files:
      - src/core/syncer.ts
      - src/cli/commands/sync.ts

  - id: w8
    summary: "Add tests for source-vs-disk skip and --force conflict bypass"
    status: not-started
    needs: [w6, w7]
    details: |
      In this repo. Add test coverage for:

      Source-vs-disk (w6):
      - Sync skips update when on-disk content already matches source (lock is stale)
      - Sync plan includes skipped[] entry with reason "disk-matches-source"
      - Lock file is updated to reflect new source even when update is skipped

      Force bypass (w7):
      - applySync(force=false) throws on conflicts (existing behavior, add regression test)
      - applySync(force=true) proceeds, returns list of overwritten skills
      - sync --force CLI flag passes force=true through to applySync
      - Conflict output includes promote guidance message

      Edge cases:
      - New files added locally that don't exist in source
      - Files deleted locally that exist in source
      - Sync output includes skip/block reasons in both human and --json modes
    files:
      - tests/unit/core/syncer.test.ts
      - tests/unit/cli/commands.test.ts

  - id: w9
    summary: "Run full sync on all three scopes and verify clean state"
    status: not-started
    needs: [w5, w8]
    details: |
      Integration validation (external to this repo):
      - Run `skillsync sync` at global, BenchBox, and Oxbow levels
      - Run `skillsync status --json` at each level — expect 0 modified, 0 missing, 0 extra
      - Run `skillsync validate` at each level — expect no errors
      - Run `skillsync doctor` at each level — expect all OK
      - Verify Claude Code loads skills correctly from .claude/skills/
      - Verify Codex loads skills correctly from .codex/skills/ (no wrapper needed)
      - Modify a skill locally, run sync, verify conflict message with promote guidance
      - Run sync --force, verify overwrite succeeds and logs what was replaced
      - Promote the modification, re-sync, verify clean state

deferred:
  - id: d1
    summary: "Per-target content transforms (v0.2+)"
    reason: |
      Strategy A avoids this by flattening to identical content. If future use cases
      require target-specific SKILL.md variants (e.g., Codex needs different formatting),
      this would add a transforms layer to the materializer. Deferred because flattening
      is simpler and sufficient for current needs.
  - id: d2
    summary: "Automated promote command (v0.2+)"
    reason: |
      v0 promote provides manual guidance only. Automated promote would copy modified
      files from target back to source, re-hash, and update lock. Deferred because
      manual promote is acceptable for the current skill count (~10 skills).
  - id: d3
    summary: "Content overlays for per-target section injection (v0.2+)"
    reason: |
      Would allow a manifest to declare "inject this section into SKILL.md for Codex
      but not Claude" without maintaining separate source files. Strategy A eliminates
      the immediate need by using identical content everywhere.

metadata:
  tags:
    - "codex"
    - "sync-safety"
    - "content-validation"
    - "multi-agent"
  estimated_effort: "Large"
  created_date: "2026-03-07"
  last_updated: "2026-03-07"
impact:
  business_value: |
    Enables skillsync to actually manage the user's real skill infrastructure.
    Without flattening, skillsync cannot model the Codex dual-layer pattern.
    Without --force support, conflicts permanently block sync with no escape hatch.
    Together these make skillsync production-ready for multi-agent skill management.
  user_impact: |
    Eliminates manual skill copying across 6 locations (3 Claude + 3 Codex).
    Single source of truth per skill with safe, content-aware sync.
    Format consistency enforced by having one canonical version.
    Local modifications protected from accidental overwrite with clear guidance.
must_preserve:
  - "Existing multi-target materialization behavior (same content to all targets)"
  - "Lock file format and provenance tracking"
  - "Drift detection SHA256 hashing"
  - "All 137 existing tests must continue to pass"
  - "applySync() conflict-blocking behavior (syncer.ts:172-178) — must not regress, only extend with force parameter"
  - "planSync() drift-to-conflict routing (syncer.ts:132-147) — existing logic is correct, do not duplicate"
approach: |
  Two parallel tracks: external skill flattening (w1-w5) and library hardening (w6-w8),
  converging at integration validation (w9).

  External track: Audit → Reconcile (3 parallel sub-units) → Sidecar → Manifest → Deploy.
  Each step is reversible (backups before destructive changes). Use skillsync's own
  --dry-run to validate before applying.

  Library track: Source-vs-disk comparison (w6) then --force bypass (w7) then tests (w8).
  Each is independently valuable and incrementally deployable. Both build on existing
  infrastructure — the goal is to fill gaps, not rewrite.
anti_patterns:
  - "DO NOT modify skill content during materialization — because skillsync must remain content-agnostic — the flattening happens at the source level, not in the sync engine"
  - "DO NOT use file timestamps for change detection — because atime/mtime are unreliable across filesystems — always use content hashes (SHA256)"
  - "DO NOT silently overwrite locally modified skills — because users may have intentional local changes — always warn or block unless --force"
  - "DO NOT create a 'Codex adapter' that transforms content per target — because this violates the single-source-of-truth model — flatten the source instead"
  - "DO NOT duplicate conflict detection logic — because planSync() already handles drift+upstream collisions correctly — only add the force bypass and messaging in applySync/sync.ts"
verification:
  - description: "Existing tests still pass after library changes"
    command: "npx vitest run"
    expected_output: "All 137+ tests pass, 0 failures"
  - description: "Source-vs-disk skip works correctly"
    command: "npx vitest run tests/unit/core/syncer.test.ts"
    expected_output: "All syncer tests pass including new disk-matches-source skip tests"
  - description: "Force bypass and conflict messaging work"
    command: "npx vitest run tests/unit/cli/commands.test.ts"
    expected_output: "All command tests pass including --force and conflict guidance tests"
  - description: "All three projects show clean state after full sync"
    command: "for d in ~ ~/Developer/BenchBox ~/Developer/Oxbow; do (cd \"$d\" && skillsync status --json | grep -c '\"modified\":0'); done"
    expected_output: "3 lines, each showing 1 (grep matched)"
scope_limit:
  do_not_modify:
    - "src/mcp/"
    - "_project/DONE/"
  caution:
    - "docs/specs/manifest-v0.md — do not change the manifest input schema, but DO update if SyncPlan output shape changes (new fields like skipped[])"
