id: "docs-align-with-implementation"
title: "Align all documentation with the actual v0 implementation"
worktree: "main"
priority: "High"
status: "Not Started"
description: |
  Documentation was written during the planning phase and never updated after
  implementation. There are 14 identified gaps across 4 severity levels: docs
  reference 5 CLI commands that don't exist, 3 core modules that were never
  created, and a source adapter that isn't implemented. The MCP doc is
  aspirational while the code is concrete. The README still says the project
  is "in planning mode" despite being feature-complete with 137 passing tests.

  Source of truth: /Users/joe/.claude/plans/snuggly-wiggling-coral.md
category: "Documentation"
deps:
  needs: []
work:
  - id: w1
    summary: "Update README.md: remove 'planning mode', fix command list, convert absolute paths to relative"
    status: not-started
    details: |
      - Line 163: Remove "currently in planning mode" and the TODO yaml references (lines 161-173)
      - Lines 97-106: Replace command list with actual 9 commands (sync, status, validate, diff, doctor, pin, unpin, prune, promote) — remove `install`
      - Lines 14-22: Convert absolute paths (/Users/joe/Developer/skillsync/docs/...) to relative (docs/...)
      - Add a "Current Status" section reflecting feature-complete state (137 tests, all phases done)
    files:
      - README.md

  - id: w2
    summary: "Rewrite docs/specs/architecture-v0.md module tree to match actual codebase"
    status: not-started
    details: |
      Section 1 module tree must be updated:
      - Remove non-existent modules: promoter.ts, store.ts, profile.ts
      - Add actual modules: compatibility.ts, config-generator.ts, drift.ts, materializer.ts, parser.ts, portability.ts, trust.ts, security.ts
      - Fix CLI structure: format.ts -> output.ts, add source-factory.ts and parse.ts
      - Remove non-existent CLI commands: init.ts, check.ts, list.ts, serve.ts
      - Note unpin is handled within pin.ts (no separate file)
      - Remove sources/registry.ts or mark as "planned v0.2+"
      - Update any prose referencing the old module set
    files:
      - docs/specs/architecture-v0.md

  - id: w3
    summary: "Rewrite docs/mcp.md with actual implemented MCP surface"
    status: not-started
    details: |
      Replace aspirational language with concrete documentation:
      - Resources: skill://list, skill://{name}, skill://{name}/{+path}
      - Tools: search-skills (query string input), skill-status (drift summary), validate-skills (portability + compatibility)
      - Prompts: use-skill (generates prompt from SKILL.md content)
      - Note read-only v0 stance (no mutation tools)
      - Document input schemas for each tool
      - Reference src/mcp/server.ts as implementation source
    files:
      - docs/mcp.md

  - id: w4
    summary: "Update docs/cli.md to document actual 9 commands with flags and examples"
    status: not-started
    details: |
      - Remove phantom commands: install, init, check, list, serve
      - Document actual 9 commands: sync, status, validate, diff, doctor, pin, unpin, prune, promote
      - For each command document: purpose, flags (--json, --dry-run, --force, --exit-code, --project), positional args
      - Update example flow at bottom (lines 90-97) to use actual commands
      - Note that diff wraps sync --dry-run, unpin is the inverse of pin
      - Note promote gives manual guidance in v0 (automated in v0.2+)
    files:
      - docs/cli.md

  - id: w5
    summary: "Update docs/specs/promotion-v0.md to clarify v0 behavior"
    status: not-started
    details: |
      - Clarify that `promote` command EXISTS in v0 but provides manual guidance steps only
      - The command prints instructions for manually copying changes upstream
      - Automated promotion (copy-back + re-sync) is deferred to v0.2+
      - Reconcile with cli.md and README which list promote as a v0 command
    files:
      - docs/specs/promotion-v0.md

  - id: w6
    summary: "Update docs/release-v0.md to reflect actual implementation state"
    status: not-started
    details: |
      - Update support matrix to reflect what's actually implemented vs planned
      - Mark registry source as explicitly "Not implemented (v0.2+)"
      - Update test count if different from 137
      - Review release checklist items against actual state
      - Note that README, docs need updating (this TODO) before release
    files:
      - docs/release-v0.md

  - id: w7
    summary: "Retire or archive superseded design docs"
    status: not-started
    details: |
      Three design docs are now superseded by specs + implementation:
      - docs/architecture.md (superseded by docs/specs/architecture-v0.md)
      - docs/manifest-and-store.md (superseded by docs/specs/manifest-v0.md)
      - docs/validation-and-trust.md (superseded by docs/security.md)
      Options: (a) delete them, (b) move to docs/archive/, (c) add deprecation header pointing to successor
      Also update docs/index.md reading order to remove/redirect these
      Also review docs/competitive-analysis.md for staleness
    files:
      - docs/architecture.md
      - docs/manifest-and-store.md
      - docs/validation-and-trust.md
      - docs/index.md
      - docs/competitive-analysis.md

  - id: w8
    summary: "Verify validation rules in spec match implementation"
    status: not-started
    needs: [w2]
    details: |
      docs/specs/manifest-v0.md section 7 lists 11 validation rules.
      Cross-reference each against src/core/validator.ts to confirm:
      - Which rules are actually enforced
      - Which are documented but not implemented
      - Any implemented rules not documented
      Update the spec to match reality (mark unimplemented as "planned").
    files:
      - docs/specs/manifest-v0.md
      - src/core/validator.ts

metadata:
  tags:
    - "docs"
    - "alignment"
    - "release-readiness"
  estimated_effort: "Medium"
  created_date: "2026-03-07"
  last_updated: "2026-03-07"
impact:
  business_value: |
    Documentation that contradicts the implementation erodes trust and causes
    confusion for new users, contributors, and AI agents consuming these docs.
    Blocking issue for any public release.
  user_impact: |
    Users following the README or CLI docs will try commands that don't exist
    and miss commands that do. MCP integrators have no concrete reference.
must_preserve:
  - "All existing spec content that accurately describes the implementation"
  - "Design rationale and architectural principles sections (still valid)"
  - "Security and trust policy documentation (docs/security.md is accurate)"
approach: |
  Work through docs in priority order (README first, specs second, design docs
  last). For each file, read the current content, compare against the actual
  code (already analyzed in the plan), and update to match reality. Preserve
  valid design rationale; remove or correct factual claims that are wrong.
anti_patterns:
  - "DO NOT add aspirational features as if they exist — because users will try to use them — document only what's implemented, with 'planned' labels for future work"
  - "DO NOT delete design rationale — because it explains WHY decisions were made — only correct factual inaccuracies"
verification:
  - description: "All CLI commands mentioned in docs exist in the codebase"
    command: "grep -oP 'skillsync (\\w+)' docs/cli.md | sort -u"
    expected_output: "Only lists: sync, status, validate, diff, doctor, pin, unpin, prune, promote"
  - description: "No absolute user paths in README"
    command: "grep -c '/Users/' README.md"
    expected_output: "0"
  - description: "README does not say 'planning mode'"
    command: "grep -c 'planning mode' README.md"
    expected_output: "0"
  - description: "Architecture spec module tree matches actual files"
    command: "ls src/core/*.ts src/cli/commands/*.ts src/sources/*.ts | wc -l"
    expected_output: "Matches count in architecture spec module tree"
scope_limit:
  do_not_modify:
    - "src/"
    - "tests/"
    - "_project/DONE/"
